name: pomodoro
description: "Project of a pomodoro made in flutter."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.3+3

environment:
  sdk: ">=3.4.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  flutter_bloc: ^8.1.6
  get_it: ^7.7.0
  shared_preferences: ^2.3.1
  badges: ^3.1.2
  animated_snack_bar: ^0.4.0
  curved_navigation_bar: ^1.0.6
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  equatable: ^2.0.5
  share_plus: ^10.0.2
  path_provider: ^2.1.4
  intl: ^0.20.2
  audioplayers: ^6.1.0
  # Firebase (aligned versions)
  firebase_core: ^3.4.1
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.5.0
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.3
  local_auth: ^3.0.0
  device_calendar: ^4.3.2
  upgrader: ^12.3.0
  google_fonts: ^6.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

# Launcher icon generation config
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/launcher/app_icon.png
  adaptive_icon_background: "#121212" # Matching the charcoal background of the logo
  adaptive_icon_foreground: assets/launcher/app_icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/sounds/last5.mp3
    - assets/sounds/last5.wav
    - assets/sounds/cronometro.mp3
    - assets/sounds/
    - assets/terms_privacy.md
    - assets/onboarding/
    - assets/launcher/app_icon.png
